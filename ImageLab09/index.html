<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
     <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-sphere position="0 0.75 -5" radius="0.75" color="#FEFEFE"></a-sphere>
      <a-sphere position="0 1.7 -5" radius="0.6" color="#FEFEFE"></a-sphere>
      <a-sphere position="0 2.5 -5" radius="0.45" color="#FEFEFE"></a-sphere>
      <a-cone position="0 2.5 -4.55" rotation="90 0 0" radius-bottom="0.1" height="0.5" color="orange"></a-cone>
      <a-sphere position="-0.15 2.65 -4.6" radius="0.05" color="black"></a-sphere>
      <a-sphere position="0.15 2.65 -4.6" radius="0.05" color="black"></a-sphere>

      <a-sphere position="0.15 2.35 -4.6" radius="0.05" color="black"></a-sphere>
      <a-sphere position="0.05 2.3 -4.6" radius="0.05" color="black"></a-sphere>
      <a-sphere position="-0.05 2.3 -4.6" radius="0.05" color="black"></a-sphere>
      <a-sphere position="-0.15 2.35 -4.6" radius="0.05" color="black"></a-sphere>

      <a-sphere position="0 1.7 -4.4" radius="0.05" color="black"></a-sphere>
      <a-sphere position="0 1.45 -4.45" radius="0.05" color="black"></a-sphere>
      <a-sphere position="0 1.95 -4.45" radius="0.05" color="black"></a-sphere>

      <a-cylinder position="0.5 1.7 -5" rotation="0 0 -40" radius="0.03" height="1.5" color="brown"></a-cylinder>
      <a-cylinder position="-0.5 1.7 -5" rotation="0 0 -40" radius="0.03" height="1.5" color="brown"></a-cylinder>
      <!-- <a-sky color="#000000"></a-sky> -->
      <!-- the enviroment entity includes a sky. Choose from the presets"none, default, contact, egypt, checkerboard, forest, goaland, yavapai, goldmine, threetowers, poison, arches, tron, japan, dream, volcano, starry, osiris, moon" -->
      <a-entity environment="preset: starry; dressingAmount: 500"></a-entity>
    </a-scene>
  </body>
</html>
